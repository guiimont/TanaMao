<!-- MANTIVE SUA ESTRUTURA ORIGINAL E CORRIGI O CHECKOUT -->

<script>
const BACKEND_URL = "https://tanamao-backend.onrender.com";

let clienteAtual = JSON.parse(localStorage.getItem("tanamao_cliente")) || null;

function checarLogin() {
  const bar = document.getElementById("auth-bar");
  if (clienteAtual) {
    bar.innerHTML = "Olá de novo, <strong>" + clienteAtual.nome.split(" ")[0] + "</strong>!";
    bar.style.display = "block";
  } else {
    bar.style.display = "none";
  }
}

checarLogin();

// PRODUTOS (mantido)
const PRODS = [
  { id:"p1", nome:"Panqueca", preco:18 },
  { id:"p2", nome:"Kibe Assado Recheado", preco:20 },
  { id:"p3", nome:"Suflê de Legumes", preco:17 },
  { id:"p4", nome:"Bolo de Banana", preco:22 },
  { id:"p5", nome:"Combo Degustação", preco:35 }
];

const qtds = { p1:0, p2:0, p3:0, p4:0, p5:0 };
let pagSel = "";

function qty(id, d) {
  qtds[id] = Math.max(0, qtds[id] + d);
  document.getElementById(id).textContent = qtds[id];
}

function selecionarPag(tipo) {
  pagSel = tipo;
  document.querySelectorAll(".pag-item").forEach(el => el.classList.remove("ativo"));
  document.getElementById("pag-" + tipo).classList.add("ativo");
}

function abrirModal() {
  const ativos = PRODS.filter(p => qtds[p.id] > 0);
  if (!ativos.length) { alert("Selecione pelo menos um item."); return; }
  if (!pagSel) { alert("Escolha a forma de pagamento."); return; }

  document.getElementById("overlay").classList.add("on");
}

function fecharModal() {
  document.getElementById("overlay").classList.remove("on");
}

async function irParaCheckout() {
  let cliente = clienteAtual;

  if (!cliente) {
    const nome = document.getElementById("m-nome").value.trim();
    const tel  = document.getElementById("m-tel").value.trim();

    if (!nome || !tel) {
      alert("Preencha nome e WhatsApp");
      return;
    }

    cliente = { nome, tel };
    localStorage.setItem("tanamao_cliente", JSON.stringify(cliente));
    clienteAtual = cliente;
    checarLogin();
  }

  const ativos = PRODS.filter(p => qtds[p.id] > 0);

  const payload = {
    items: ativos.map(p => ({
      id: p.id,
      quantity: qtds[p.id]
    })),
    paymentMethod: pagSel,
    customer: {
      nome: cliente.nome,
      telefone: cliente.tel
    },
    source: "site"
  };

  try {
    const res = await fetch(BACKEND_URL + "/api/checkout/create-preference", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (!data.ok) {
      alert("Erro ao gerar pagamento");
      return;
    }

    window.location.href = data.checkoutUrl;

  } catch (e) {
    alert("Erro de conexão");
  }
}
</script>
