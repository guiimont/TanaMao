<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Tá na Mão</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f4; }
.topbar { background:#2D5235; color:#fff; padding:14px; text-align:center; font-weight:bold; }
.container { padding:16px; }

.login { display:flex; flex-direction:column; gap:10px; max-width:300px; margin:60px auto; }
button { padding:12px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; }

.board { display:flex; gap:12px; overflow-x:auto; }
.column { background:#fff; border-radius:10px; padding:10px; min-width:260px; }
.card { background:#fafafa; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd; }

.actions button { margin-top:6px; width:100%; }

.whats { background:#25D366; color:#fff; }
.next { background:#C9A86A; }
.print { background:#333; color:#fff; }
</style>
</head>

<body>

<div id="login" class="login">
<h2>Painel</h2>
<button onclick="entrar('producao')">Produção</button>
<button onclick="entrar('gestor')">Gestor</button>
</div>

<div id="app" style="display:none">
<div class="topbar">Painel Tá na Mão</div>
<div class="container">

<input id="busca" placeholder="Buscar cliente..." oninput="render()" style="padding:10px;width:100%;margin-bottom:10px">

<div class="board" id="board"></div>

</div>
</div>

<script>

const API = "https://tanamao-backend.onrender.com/api/operations";

let perfil = null;
let pedidos = [];

function entrar(p){
  perfil = p;
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  carregar();
}

async function carregar(){
  const res = await fetch(API);
  pedidos = await res.json();
  render();
}

function formatTime(date){
  const diff = (Date.now() - new Date(date))/60000;
  return Math.floor(diff) + " min";
}

function whatsapp(p){
  const msg = `Olá ${p.customer_name}, seu pedido já está em andamento!`;
  const num = p.customer_phone.replace(/\D/g,"");
  window.open(`https://wa.me/55${num}?text=${encodeURIComponent(msg)}`);
}

function update(id, status){
  fetch(API+"/"+id,{
    method:"PATCH",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({delivery_status:status})
  }).then(()=>carregar());
}

function render(){

  const busca = document.getElementById("busca").value.toLowerCase();

  const colunas = {
    pending: "Entrou",
    preparing: "Produção",
    ready: "Pronto",
    out_for_delivery: "Entrega"
  };

  const board = document.getElementById("board");
  board.innerHTML = "";

  Object.entries(colunas).forEach(([key, title]) =>{

    const col = document.createElement("div");
    col.className="column";
    col.innerHTML = `<h3>${title}</h3>`;

    pedidos
      .filter(p => p.delivery_status === key)
      .filter(p => p.customer_name.toLowerCase().includes(busca))
      .forEach(p =>{

        const card = document.createElement("div");
        card.className="card";

        card.innerHTML = `
          <strong>${p.customer_name}</strong><br>
          ${p.delivery_address || ""}<br>
          ⏱ ${formatTime(p.created_at)}
          <div class="actions">
            <button class="whats" onclick='whatsapp(${JSON.stringify(p)})'>WhatsApp</button>
            ${perfil==="gestor" ? `<button class="print" onclick="window.print()">Imprimir</button>`:""}
            <button class="next" onclick="next('${p.id}','${key}')">Avançar</button>
          </div>
        `;

        col.appendChild(card);
      });

    board.appendChild(col);

  });

}

function next(id, current){
  const flow = ["pending","preparing","ready","out_for_delivery","delivered"];
  const next = flow[flow.indexOf(current)+1];
  if(next) update(id,next);
}

setInterval(carregar, 5000);

</script>

</body>
</html>
