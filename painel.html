<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Operacional - Tá na Mão!</title>

<style>
:root{
--verde:#3C6E47;
--dourado:#C9A86A;
--fundo:#f4f6f4;
}

body{font-family:Arial;background:var(--fundo);margin:0}

header{
background:var(--verde);
color:#fff;
padding:16px;
text-align:center;
}

.topbar{
display:flex;
gap:10px;
padding:16px;
justify-content:center;
flex-wrap: wrap;
}

.btn{
background:var(--dourado);
border:none;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

/* ÁREAS ADMINISTRATIVAS */
[data-role="admin"] {
    background: #fff;
    margin: 16px;
    padding: 20px;
    border-radius: 12px;
    border: 2px solid var(--dourado);
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

.financeiro-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
    margin-top: 10px;
}

.fin-item {
    padding: 10px;
    border-radius: 8px;
    background: #fdfdfd;
    border: 1px solid #eee;
}

.fin-item b { color: var(--verde); }

/* FORMULÁRIO DE CUSTOS */
.form-custos {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 10px;
}

.form-custos input {
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
    flex: 1;
    min-width: 120px;
}

.board{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
padding:16px;
}

.column{
background:#fff;
border-radius:12px;
padding:10px;
min-height:400px;
}

.column-header{
font-weight:bold;
margin-bottom:10px;
color:var(--verde);
}

.card{
background:#f9f9f9;
padding:10px;
border-radius:8px;
margin-bottom:8px;
font-size:14px;
}

.card button{
margin-top:6px;
width:100%;
}
</style>
</head>

<body>

<header>
<h2>Painel Operacional</h2>
</header>

<div class="topbar">
    <button class="btn" onclick="carregarPedidos()">Atualizar</button>
    <button class="btn" onclick="loginAdmin()">Admin 🔒</button>
    
    <button class="btn" data-role="admin" onclick="editarLimite()">Definir limite</button>
    <button class="btn" data-role="admin" onclick="abrirCardapio()">Editar Cardápio</button>
</div>

<!-- DASHBOARD FINANCEIRO -->
<div data-role="admin">
  <h3>📊 Financeiro</h3>
  <div class="financeiro-grid">
      <div class="fin-item">Faturamento: <b id="f-bruto">R$ 0,00</b></div>
      <div class="fin-item">Taxas: <b id="f-taxas">R$ 0,00</b></div>
      <div class="fin-item">Custos: <b id="f-custos">R$ 0,00</b></div>
      <div class="fin-item">Lucro: <b id="f-lucro" style="font-size: 1.1em;">R$ 0,00</b></div>
  </div>
</div>

<!-- LANÇAR CUSTO (TESS) -->
<div data-role="admin">
  <h3>💸 Lançar Custo</h3>
  <div class="form-custos">
      <input id="c-desc" placeholder="Descrição (Ex: Carne, Aluguel)">
      <input id="c-valor" type="number" placeholder="Valor (R$)">
      <input id="c-cat" placeholder="Categoria">
      <button class="btn" style="background: var(--verde); color: white;" onclick="salvarCusto()">Salvar</button>
  </div>
</div>

<div class="board">
    <div class="column">
        <div class="column-header">Entrou</div>
        <div id="col-paid"></div>
    </div>
    <div class="column">
        <div class="column-header">Produção</div>
        <div id="col-preparing"></div>
    </div>
    <div class="column">
        <div class="column-header">Pronto</div>
        <div id="col-ready"></div>
    </div>
    <div class="column">
        <div class="column-header">Entrega</div>
        <div id="col-delivery"></div>
    </div>
</div>

<script>
const API = "https://onrender.com";
let pedidos = [];
let LIMITE = 100;

const fmt = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);

// ✅ CONTROLE DE ACESSO
let USER_ROLE = localStorage.getItem("tnm_role") || "operador";

function loginAdmin() {
  const senha = prompt("Senha admin:");
  if (senha === "123456") {
    USER_ROLE = "admin";
    localStorage.setItem("tnm_role", "admin");
    aplicarPermissoes();
    carregarFinanceiro();
  } else {
    alert("Senha incorreta");
  }
}

function aplicarPermissoes() {
  document.querySelectorAll("[data-role]").forEach(el => {
    el.style.display = (USER_ROLE === "admin") ? "block" : "none";
  });
}

// ✅ FINANCEIRO & CUSTOS (TESS)
async function carregarFinanceiro() {
  if (USER_ROLE !== "admin") return;
  try {
      const res = await fetch(API + "/operations/orders");
      const data = await res.json();
      const pedidosFin = data.orders || [];

      let bruto = 0;
      let taxas = 0;

      pedidosFin.forEach(p => {
        if (p.payment_status === "approved") {
          bruto += Number(p.total || 0);
          taxas += Number(p.gateway_fee || 0);
        }
      });

      const resCosts = await fetch(API + "/costs");
      const dataCosts = await resCosts.json();
      const custos = (dataCosts.costs || []).reduce((acc, c) => acc + Number(c.value), 0);

      const lucro = bruto - taxas - custos;

      document.getElementById("f-bruto").textContent = fmt(bruto);
      document.getElementById("f-taxas").textContent = fmt(taxas);
      document.getElementById("f-custos").textContent = fmt(custos);
      document.getElementById("f-lucro").textContent = fmt(lucro);
  } catch (e) { console.error("Erro no financeiro:", e); }
}

async function salvarCusto() {
  const description = document.getElementById("c-desc").value;
  const value = document.getElementById("c-valor").value;
  const category = document.getElementById("c-cat").value;

  if (!description || !value) return alert("Preencha descrição e valor");

  await fetch(API + "/costs", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ description, value, category })
  });

  alert("Custo salvo com sucesso!");
  document.getElementById("c-desc").value = "";
  document.getElementById("c-valor").value = "";
  document.getElementById("c-cat").value = "";
  carregarFinanceiro();
}

// ================= PEDIDOS =================
async function carregarPedidos(){
    try {
        const res = await fetch(API + "/operations/orders");
        const data = await res.json();
        pedidos = data.orders || [];
        renderizar();
        if(USER_ROLE === "admin") carregarFinanceiro();
    } catch (e) { console.error("Erro ao carregar pedidos:", e); }
}

function renderizar(){
    renderCol("col-paid", pedidos.filter(p => p.payment_status==="approved" && (p.delivery_status==="pending" || !p.delivery_status)));
    renderCol("col-preparing", pedidos.filter(p => p.delivery_status==="preparing"));
    renderCol("col-ready", pedidos.filter(p => p.delivery_status==="ready"));
    renderCol("col-delivery", pedidos.filter(p => p.delivery_status==="out_for_delivery"));
}

function renderCol(id, lista){
    const el = document.getElementById(id);
    el.innerHTML = "";
    if(!lista.length){
        el.innerHTML = "<div class='card'>Vazio</div>";
        return;
    }
    lista.forEach(p=>{
        el.innerHTML += `<div class="card">
            <strong>${p.customer_name || "Cliente"}</strong><br>
            Total: R$ ${Number(p.total||0).toFixed(2)}<br>
            ${botao(p)}
        </div>`;
    });
}

function botao(p){
  const s = p.delivery_status;
  if(s==="pending" || !s) return `<button onclick="atualizar('${p.id}','preparing')">Produção</button>`;
  if(s==="preparing") return `<button onclick="atualizar('${p.id}','ready')">Pronto</button>`;
  if(s==="ready") return `<button onclick="atualizar('${p.id}','out_for_delivery')">Entrega</button>`;
  if(s==="out_for_delivery") return `<button onclick="atualizar('${p.id}','delivered')">Finalizar</button>`;
  return "";
}

async function atualizar(id,status){
    await fetch(API+"/operations/orders/"+id+"/status",{
        method:"PATCH",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({delivery_status:status})
    });
    carregarPedidos();
}

function editarLimite(){
    const novo = prompt("Novo limite:", LIMITE);
    if(novo) LIMITE = Number(novo);
}

function abrirCardapio(){ window.location.href = "/cardapio.html"; }

setInterval(carregarPedidos,30000);
aplicarPermissoes();
carregarPedidos();
</script>
</body>
</html>
