<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Admin Cardápio</title>
<style>
body{font-family:Arial;background:#f4f6f4;padding:20px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px}
input,textarea{width:100%;margin:5px 0;padding:8px}
button{padding:10px;margin-top:5px;cursor:pointer}
</style>
</head>
<body>

<h2>Cadastro de Produto</h2>

<div class="card">
<input id="nome" placeholder="Nome">
<textarea id="desc" placeholder="Descrição"></textarea>
<input id="preco" type="number" placeholder="Preço">
<input id="img" type="file">
<button onclick="criar()">Salvar</button>
</div>

<h2>Produtos</h2>
<div id="lista"></div>

<script>
const API = "https://tanamao-backend.onrender.com/api";

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.readAsDataURL(file);
    r.onload=()=>res(r.result);
    r.onerror=rej;
  });
}

async function criar(){
  const name = document.getElementById("nome").value;
  const description = document.getElementById("desc").value;
  const price = document.getElementById("preco").value;
  const file = document.getElementById("img").files[0];

  let image_url = "";
  if(file){
    image_url = await fileToBase64(file);
  }

  const res = await fetch(API+"/products",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,description,price,image_url})
  });

  const data = await res.json();
  console.log(data);

  if(!data.ok) return alert("Erro");

  carregar();
}

async function carregar(){
  const res = await fetch(API+"/products");
  const data = await res.json();

  const el = document.getElementById("lista");
  el.innerHTML="";

  data.products.forEach(p=>{
    el.innerHTML += `
      <div class="card">
        <b>${p.name}</b><br>
        ${p.description}<br>
        R$ ${p.price}<br>
        ${p.image_url ? `<img src="${p.image_url}" width="100">` : ""}
        <button onclick="del('${p.id}')">Excluir</button>
      </div>
    `;
  });
}

async function del(id){
  await fetch(API+"/products/"+id,{method:"DELETE"});
  carregar();
}

carregar();
</script>

</body>
</html>
