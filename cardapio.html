<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Cardápio - Admin</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f6f4; margin: 0; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    h2 { color: #3C6E47; }
    .form-card, .card { background: #fff; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .field { margin-bottom: 15px; }
    input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    .btn-save { background: #3C6E47; color: white; }
    .btn-delete { background: #c0392b; color: white; }
    .btn-save:hover { background: #2d5235; }
    .btn-delete:hover { background: #a53125; }
    img.preview { max-width: 100px; border-radius: 8px; margin-top: 10px; display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Gestão de Produtos</h2>
    
    <!-- Formulário Único de Criação -->
    <div class="form-card">
      <h3>Novo Produto</h3>
      <div class="field">
        <input id="novo-nome" type="text" placeholder="Nome do produto">
      </div>
      <div class="field">
        <textarea id="novo-desc" placeholder="Descrição"></textarea>
      </div>
      <div class="field">
        <input id="novo-preco" type="number" step="0.01" placeholder="Preço (ex: 19.90)">
      </div>
      <div class="field">
        <label style="font-size: 12px; color: #666; display: block; margin-bottom: 5px;">Imagem do Produto:</label>
        <input type="file" id="novo-img-file" accept="image/png, image/jpeg, image/webp">
      </div>
      <button class="btn-save" id="btn-criar" onclick="criarProduto()">Salvar Produto</button>
    </div>

    <!-- Lista de Produtos para Edição/Exclusão -->
    <div id="lista">Carregando produtos...</div>
  </div>

  <script>
    const API = "https://tanamao-backend.onrender.com"; // ATENÇÃO: Troque pela URL do seu backend!

    // Converte Arquivo para Base64
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
      });
    }

    async function carregar() {
      try {
        const res = await fetch(API + "/products");
        const data = await res.json();
        
        const el = document.getElementById("lista");
        el.innerHTML = "";
        
        (data.products || []).forEach(p => {
          el.innerHTML += `
            <div class="card">
              <div class="field"><input value="${p.name}" id="name-${p.id}"></div>
              <div class="field"><textarea id="desc-${p.id}">${p.description || ""}</textarea></div>
              <div class="field"><input value="${p.price}" id="price-${p.id}" type="number" step="0.01"></div>
              
              <!-- Mantemos a URL escondida para não perder caso o admin não altere a imagem -->
              <input type="hidden" value="${p.image_url || ""}" id="current-img-${p.id}">
              
              <div class="field">
                <label style="font-size: 12px; color: #666;">Trocar imagem:</label>
                <input type="file" id="file-${p.id}" accept="image/png, image/jpeg, image/webp">
                ${p.image_url ? `<img src="${p.image_url}" class="preview">` : ''}
              </div>

              <button class="btn-save" onclick="salvar('${p.id}')">Atualizar</button>
              <button class="btn-delete" onclick="deletar('${p.id}')">Excluir</button>
            </div>
          `;
        });
      } catch (e) {
        console.error(e);
        document.getElementById("lista").innerHTML = "Erro ao carregar produtos.";
      }
    }

    async function criarProduto() {
      const btn = document.getElementById("btn-criar");
      const name = document.getElementById("novo-nome").value.trim();
      const description = document.getElementById("novo-desc").value.trim();
      const price = document.getElementById("novo-preco").value;
      const file = document.getElementById("novo-img-file").files[0];

      if (!name) return alert("Nome obrigatório");

      btn.disabled = true;
      btn.innerText = "Salvando...";

      let image_url = "";
      if (file) {
        try {
          image_url = await fileToBase64(file);
        } catch (e) {
          alert("Erro ao ler imagem.");
          btn.disabled = false;
          btn.innerText = "Salvar Produto";
          return;
        }
      }

      try {
        const res = await fetch(API + "/products", {
          method: "POST",
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, description, price, image_url })
        });
        const data = await res.json();
        
        if (!data.ok) throw new Error("Erro no backend");

        document.getElementById("novo-nome").value = "";
        document.getElementById("novo-desc").value = "";
        document.getElementById("novo-preco").value = "";
        document.getElementById("novo-img-file").value = "";
        
        await carregar();
      } catch (e) {
        console.error(e);
        alert("Erro de conexão ao salvar produto.");
      } finally {
        btn.disabled = false;
        btn.innerText = "Salvar Produto";
      }
    }

    async function salvar(id) {
      const name = document.getElementById("name-"+id).value;
      const description = document.getElementById("desc-"+id).value;
      const price = document.getElementById("price-"+id).value;
      const file = document.getElementById("file-"+id).files[0];
      
      let image_url = document.getElementById("current-img-"+id).value; // Mantém a antiga se não houver upload

      if (file) {
        try {
          image_url = await fileToBase64(file);
        } catch(e) {
          return alert("Erro ao ler nova imagem.");
        }
      }

      try {
        await fetch(API + "/products/" + id, {
          method: "PUT",
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, description, price, image_url })
        });
        alert("Atualizado com sucesso!");
        carregar();
      } catch (e) {
        alert("Erro ao atualizar.");
      }
    }

    async function deletar(id) {
      if(!confirm("Excluir produto definitivamente?")) return;
      try {
        await fetch(API + "/products/" + id, { method: "DELETE" });
        carregar();
      } catch (e) {
        alert("Erro ao excluir.");
      }
    }

    // Init
    carregar();
  </script>
</body>
</html>
